<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>TIENDA PROYECTO1</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

<header class="top-bar">
  <div class="nav-container">
    <img src="images/logo.png" alt="Logo" class="logo">
    <h1>Mi Tienda</h1>
  </div>
</header>

  <!-- HERO -->
  <section class="hero">
    <h2>Bienvenido a mi tienda</h2>
    <p>Productos de alta calidad</p>
  </section>

  <!-- PRODUCTOS -->
  <section class="productos">

    <div class="producto">
      <img src="images/producto1.jpg" alt="Producto 1">
      <h3>Producto 1</h3>
      <p>$50.000</p>
      <a href="LINK_DE_SHOPIFY_1">
        <button>Comprar</button>
      </a>
    </div>

    <div class="producto">
      <img src="images/producto2.jpg" alt="Producto 2">
      <h3>Producto 2</h3>
      <p>$80.000</p>
      <a href="LINK_DE_SHOPIFY_2">
        <button>Comprar</button>
      </a>
    </div>

  </section>

  <!-- FOOTER -->
  <footer>
    <p>© 2026 Mi Tienda</p>
  </footer>

</body>
</html>
